syntax = "proto3"; 
package logger;

service EventLogger 
{
  rpc LogEvent (LogRequest) returns (LogResponse); 
  rpc GetNodeLogs (NodeRequest) returns (LogList);
  rpc GetSeverityLogs (SeverityRequest) returns (LogList);
}

message LogRequest 
{
  string node_name = 1;
  string severity = 2;
  string message = 3;
}

message LogResponse 
{
  bool success = 1;
}

message NodeRequest 
{
  string node_name = 1;
}

message SeverityRequest 
{
  string severity = 1;
}

message LogEntry 
{
  string timestamp = 1;
  string severity = 2;
  string message = 3;
  string node_name = 4;
}

// A list of logs returned to the querying client
message LogList {
  repeated LogEntry logs = 1;
}
